<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbaev Company</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
  color: white;
  overflow: hidden;
}

/* ===== LOADING SCREEN ===== */
.loader {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.loader h1 {
  font-size: 28px;
  text-align: center;
  margin-bottom: 20px;
  animation: fadeText 2s ease;
}

.loader .dot {
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes fadeText {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== MAIN ===== */
.main {
  display: none;
  min-height: 100vh;
  padding: 40px;
}

.title {
  text-align: center;
  font-size: 42px;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.btn {
  margin-top: 15px;
  background: #2563eb;
  padding: 10px;
  border-radius: 10px;
  display: inline-block;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

</style>
</head>

<body>

<!-- ЗАГРУЗКА -->
<div class="loader" id="loader">
  <h1>Компания, которую создал ребенок в 12 лет 🚀</h1>
  <div class="dot"></div>
</div>

<!-- ОСНОВНОЙ САЙТ -->
<div class="main" id="main">

  <div class="title">Urbaev Company</div>

  <div class="grid">

    <div class="card" onclick="go(' https://beksurbaiev050913-alt.github.io/Blessed-Company/')">
      🍳
      <h2>Рецепты</h2>
      <div class="btn">Открыть</div>
    </div>

    <div class="card" onclick="go('//https://beksurbaiev050913-alt.github.io/Urbaev-Company-Game/')">
      📚
      <h2>Библиотека</h2>
      <div class="btn">Открыть</div>
    </div>

    <div class="card" onclick="dev()">
      🦉
      <h2>Duolingo</h2>
      <div class="btn">Открыть</div>
    </div>

    <div class="card" onclick="dev()">
      🤖
      <h2>ИИ</h2>
      <div class="btn">Открыть</div>
    </div>

  </div>

</div>

<!-- МОДАЛКА -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>🚧 В разработке</h2>
    <p>Скоро будет мощная штука 😎</p>
    <br>
    <button onclick="closeModal()">Ок</button>
  </div>
</div>

<script>

// Загрузка (3 секунды)
setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.body.style.overflow = 'auto';
}, 3000);

// переход
function go(link) {
  window.open(link, '_blank');
}

// модалка
function dev() {
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

</script>

</body>
</html>
