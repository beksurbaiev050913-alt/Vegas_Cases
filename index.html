<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бека Prime - Возвращение Легенды Vegas Cases Beta Test</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,.16), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255,0,200,.15), transparent 25%),
        radial-gradient(circle at 55% 85%, rgba(80,120,255,.16), transparent 28%),
        linear-gradient(135deg, #070814, #10152f 35%, #150d2b 68%, #07111b);
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(90deg, rgba(0,255,255,.05) 1px, transparent 1px),
        linear-gradient(rgba(255,0,200,.035) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 18s linear infinite;
      opacity: .35;
    }

    body::after {
      background:
        radial-gradient(circle at 25% 25%, rgba(0,255,255,.18), transparent 16%),
        radial-gradient(circle at 75% 55%, rgba(255,0,180,.16), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(95,0,255,.18), transparent 18%);
      filter: blur(45px);
      animation: glowShift 8s ease-in-out infinite alternate;
      opacity: .8;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    @keyframes glowShift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(14px,-8px) scale(1.08); }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 18px;
    }

    .panel {
      background: rgba(10,16,35,.78);
      border: 1px solid rgba(0,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 0 20px rgba(0,255,255,.08), 0 0 20px rgba(255,0,200,.08);
      backdrop-filter: blur(9px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .stats-mini {
      width: 330px;
      padding: 16px;
    }

    .stats-mini h3 {
      margin: 0 0 10px;
      color: #88f9ff;
      font-size: 20px;
    }

    .line {
      margin: 7px 0;
      font-size: 14px;
      color: #e9f8ff;
    }

    .title-box {
      flex: 1;
      min-width: 280px;
      text-align: center;
      padding: 18px;
    }

    .title-box h1 {
      margin: 0;
      font-size: 36px;
      text-shadow: 0 0 10px #00f0ff, 0 0 22px #ff00d4;
      letter-spacing: 1px;
    }

    .title-box p {
      margin: 8px 0 0;
      color: #cfe8ff;
      font-size: 15px;
    }

    .test-badge {
      margin-top: 10px;
      color: #ffd86f;
      font-weight: 700;
      font-size: 14px;
    }

    .currency-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .currency-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 700;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 22px 0;
    }

    button, .link-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, rgba(0,180,255,.9), rgba(145,0,255,.9));
      box-shadow: 0 0 16px rgba(0,180,255,.18), 0 0 18px rgba(255,0,200,.14);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover, .link-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 24px rgba(0,255,255,.24), 0 0 24px rgba(255,0,200,.18);
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .gold-btn {
      background: linear-gradient(135deg, rgba(255,180,20,.95), rgba(255,215,90,.95));
      color: #241500;
    }

    .section-title {
      text-align: center;
      font-size: 28px;
      margin: 10px 0 16px;
      text-shadow: 0 0 12px #00f0ff;
    }

    .cases-grid, .inventory-grid, .store-grid, .pass-grid, .quest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .case-card, .item-card, .quest-card, .pass-level-card {
      padding: 15px;
      position: relative;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    .case-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.04), transparent 45%, rgba(0,255,255,.06));
      border-radius: 18px;
      pointer-events: none;
    }

    .case-icon {
      font-size: 44px;
      margin-bottom: 8px;
    }

    .case-card h3, .item-card h4, .pass-level-card h4, .quest-card h4 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .price {
      font-size: 18px;
      font-weight: 700;
      color: #ffd978;
      margin-bottom: 8px;
    }

    .small, .meta {
      color: #d5ecff;
      font-size: 14px;
      margin: 5px 0;
    }

    .season-badge, .tag {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,.15);
    }

    .season-badge {
      background: rgba(255,0,170,.16);
      color: #ffd8f1;
    }

    .rarity-silver { background: rgba(210,220,230,.12); color: #dce4ea; }
    .rarity-green { background: rgba(40,255,110,.12); color: #88ff9e; }
    .rarity-blue { background: rgba(45,150,255,.14); color: #69b9ff; }
    .rarity-epic { background: rgba(170,70,255,.15); color: #cf9cff; }
    .rarity-mythic { background: rgba(255,70,190,.15); color: #ff8fe0; }
    .rarity-legendary { background: rgba(255,190,40,.15); color: #ffd45e; }

    .silver-text { color: #dce4ea; font-weight: 700; }
    .green-text { color: #88ff9e; font-weight: 700; }
    .blue-text { color: #69b9ff; font-weight: 700; }
    .epic-text { color: #cf9cff; font-weight: 700; }
    .myth-text { color: #ff8fe0; font-weight: 700; }
    .legend-text { color: #ffd45e; font-weight: 700; }

    .bottom-btn {
      margin-top: 12px;
      width: 100%;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,8,18,.78);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 18px;
      backdrop-filter: blur(6px);
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: min(1120px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: 18px;
      border-radius: 24px;
      background: rgba(12,17,38,.96);
      border: 1px solid rgba(0,255,255,.22);
      box-shadow: 0 0 26px rgba(0,255,255,.1), 0 0 28px rgba(255,0,200,.08);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 28px;
      text-shadow: 0 0 10px #00f0ff;
    }

    .wheel-wrap {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
      align-items: start;
    }

    .wheel-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #ff4343;
      filter: drop-shadow(0 0 10px rgba(255,67,67,.7));
      margin-bottom: -4px;
      z-index: 2;
    }

    canvas#wheelCanvas {
      background: radial-gradient(circle, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,.12);
      box-shadow: 0 0 18px rgba(0,255,255,.12), 0 0 22px rgba(255,0,200,.12);
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1 / 1;
    }

      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content
